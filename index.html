<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto WhatsApp</title>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #e5ddd5; } /* 用了WS经典的背景色 */
        .card { text-align: center; width: 88%; max-width: 350px; background: white; padding: 40px 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        /* 绿色的对话气泡图标 */
        .ws-icon { width: 65px; height: 65px; background: #25D366; color: white; font-size: 35px; line-height: 65px; border-radius: 50%; margin: 0 auto 20px; display: block; }
        .title { font-size: 20px; font-weight: bold; margin-bottom: 12px; color: #075E54; }
        .text { font-size: 15px; color: #4a4a4a; line-height: 1.5; margin-bottom: 30px; }
        .btn { display: flex; align-items: center; justify-content: center; background: #25D366; color: white; text-decoration: none; padding: 16px; border-radius: 12px; font-weight: bold; font-size: 17px; box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3); }
        /* 按钮里的小图标 */
        .btn:before { content: '💬'; margin-right: 8px; font-size: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="ws-icon">✓</div>
        <div class="title">¡Solicitud Procesada!</div>
        <div class="text">
            Ya tienes un asesor exclusivo asignado. Haz clic abajo para <b>contactarnos por WhatsApp</b> ahora mismo:
        </div>
        <a href="https://fast.klfms.top/HrM6s7" class="btn">CHATEAR POR WHATSAPP</a>
    </div>
</body>
</html>
